---
- name: Install formulea
  become: true
  become_user: "{{ user }}"
  community.general.homebrew:
    name: "{{ item }}"
    state: latest
  loop:
    - bat
    - bottom
    - cmake
    - coreutils
    - curl
    - dos2unix
    - dust
    - exa
    - fd
    - gcc
    - git
    - gnu-sed
    - graphviz
    - htop
    - jq
    - just
    - make
    - neofetch
    - procs
    - ripgrep
    - sqlite
    - starship
    - tokei
    - tree-sitter
    - unix2dos
    - watch
    - wget
